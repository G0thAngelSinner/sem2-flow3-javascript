<!doctype html>
<html lang="da">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Interaktiv frontend-udvikling</title>
    <style>
      /* design af boks */
      .box {
        width: 120px;
        height: 120px;
        background-color: lightblue;
        border-radius: 10px;
        transition: transform 0.4s;
      }
      /* rotate */
      .box:hover {
        transform: rotate(45deg);
      }
      /* move */
      .box.active {
        transform: translate(80px);
      }
      button {
        padding: 10px;
        margin: 5px;
        background-color: thistle;
        border-radius: 10px;
      }
      button:hover {
        background-color: plum;
        transform: scale(1.2);
        transition: transform 0.6s cubic-bezier(0.12, 0, 0.39, 0);
      }
    </style>
  </head>

  <body>
    <button id="klik">Klik mig</button>
    <button id="reset">Reset</button>
    <button id="toggle">Toggle</button>
    <div class="box">Hello world!</div>
  </body>

  <script>
    document.querySelector("#klik").addEventListener("click", function () {
      document.querySelector(".box").classList.add("active");
    });

    document.querySelector("#reset").addEventListener("click", function () {
      document.querySelector(".box").classList.remove("active");
    });

    document.querySelector("#toggle").addEventListener("click", function () {
      document.querySelector(".box").classList.toggle("active");
    });

    console.log("Hello world!");
  </script>
</html>
