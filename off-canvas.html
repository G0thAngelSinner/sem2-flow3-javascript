<!doctype html>
<html lang="da">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Interaktiv frontend-udvikling</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
      }

      #menuBtn,
      #closeBtn {
        padding: 10px 16px;
        margin: 20px;
        cursor: pointer;
      }

      .offcanvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 250px;
        height: 100vh;
        background: #222;
        color: white;
        padding: 20px;
        box-sizing: border-box;

        transform: translateX(-100%);
        transition: transform 0.3s ease;
      }

      .offcanvas.open {
        transform: translateX(0);
      }

      .offcanvas ul {
        list-style: none;
        padding: 0;
        margin-top: 30px;
      }

      .offcanvas li {
        margin-bottom: 16px;
      }

      .offcanvas a {
        color: white;
        text-decoration: none;
      }
      .offcanvas a:hover {
        text-decoration: underline;
      }
      button {
        padding: 10px;
        margin: 5px;
        background-color: thistle;
        border-radius: 10px;
      }
      button:hover {
        background-color: plum;
        transform: scale(1.2);
        transition: transform 0.2s;
      }
    </style>
  </head>

  <body>
    <button id="menuBtn">Åbn menu</button>

    <nav class="offcanvas" id="offcanvasMenu">
      <button id="closeBtn">Luk</button>
      <ul>
        <li><a href="#">Forside</a></li>
        <li><a href="#">Om os</a></li>
        <li><a href="#">Kontakt</a></li>
      </ul>
    </nav>
  </body>

  <script>
    document.getElementById("menuBtn").addEventListener("click", function () {
      document.getElementById("offcanvasMenu").classList.add("open");
    });
    document.getElementById("closeBtn").addEventListener("click", function () {
      document.getElementById("offcanvasMenu").classList.remove("open");
    });
    console.log("Hello world!");
  </script>
</html>
